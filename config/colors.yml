# Emotion-based color palettes (free procedural — no external images)
palettes:
  sad:
    wash: [230, 235, 250]
    accent: [90, 120, 200]
    icon: [70, 100, 180]
    glow: [180, 200, 255]
  neutral:
    wash: [248, 248, 245]
    accent: [80, 80, 80]
    icon: [40, 40, 40]
    glow: [220, 220, 215]
  hope:
    wash: [255, 250, 235]
    accent: [255, 180, 50]
    icon: [230, 140, 30]
    glow: [255, 220, 120]
  exciting:
    wash: [255, 242, 235]
    accent: [220, 60, 40]
    icon: [205, 35, 25]
    glow: [255, 160, 100]
  inspirational:
    wash: [216, 243, 220]
