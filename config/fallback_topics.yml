topics:

  - title_ta: "ரத்தன் டாடா — ₹1 லட்சத்தில் கார் கொடுக்கலாம் என்று சொன்னவர்"
    protagonist: "ரத்தன் டாடா"
    protagonist_age: "67"
    situation: "மும்பை, 2003 ஆம் ஆண்டு — ஒரு மழை இரவு"
    core_problem: "ஒரு லட்சத்தில் கார் கட்டலாம் என்றார். பொறியாளர்கள் சிரித்தனர்."
    emotional_hook: "உலகம் முழுவதும் சிரித்தது. ஆனால் அவர் மட்டும் சிரிக்கவில்லை."
    turning_point: "சிங்கூர் தொழிற்சாலை பறிக்கப்பட்டது. 28 நாட்களில் குஜராத் சென்றார்."
    lesson: "மற்றவர்களுக்காக கட்டும் கனவுகளுக்கு வழி கண்டிப்பாக கிடைக்கும்"
    hook_question: "₹1 லட்சத்தில் கார் என்பது சாத்தியமா என்று உலகம் கேட்டபோது ரத்தன் டாடா என்ன செய்தார்?"
    open_loop: "ஆனால் நானோ வெளியீட்டிற்கு ஒரு வாரம் முன்பு என்ன நடந்தது?"
    story_mode: biographical
    content_bucket: business
    wikipedia_subject: "Tata Nano"
    beats:
      hook: "2003 ஆம் ஆண்டு. மும்பை தெருவில் ஒரு மழை இரவு. ஒரு ஸ்கூட்டரில் தந்தை, தாய், இரண்டு குழந்தைகள். மழையில் நனைந்தனர். ரத்தன் டாடா அந்த காட்சியை பார்த்தார். அவர் மனதில் ஒரு கேள்வி தோன்றியது — ஏன் இந்த குடும்பத்திற்கு ஒரு கார் இல்லை? அன்றிரவு அவர் ஒரு முடிவெடுத்தார். அது உலகையே அதிர வைத்தது."
      context: "ரத்தன் டாடா டாடா குழும தலைவர். அவர் இந்தியாவின் மிகப்பெரிய தொழிலதிபர். ஆனால் அவருக்கு மிகவும் பிடித்த கனவு வேறொன்று இருந்தது. ஒரு லட்சம் ரூபாயில் கார். அதாவது சாதாரண இந்தியக் குடும்பம் வாங்கக்கூடிய விலை. பொறியாளர்கள் சொன்னார்கள் — சாத்தியமில்லை. உலக நிபுணர்கள் சொன்னார்கள் — கனவு மட்டுமே. ஆனால் ரத்தன் டாடா கேட்கவில்லை."
      conflict: "ஐந்து ஆண்டுகள் கடந்தன. பொறியாளர்கள் போராடினார்கள். ஒவ்வொரு பாகமும் மலிவாக வேண்டும். எந்த தரமும் குறையக்கூடாது. இது முரண்பாடு. அதே நேரத்தில் அரசியல் போராட்டம் தொடங்கியது. மேற்கு வங்கத்தில் விவசாயிகள் நிலத்திற்காக போராடினார்கள். தொழிற்சாலை நிறுத்தப்பட்டது. ஆண்டுகள் வீணானது."
      escalation: "2008 ஆம் ஆண்டு. சிங்கூர் தொழிற்சாலை பூட்டப்பட்டது. ஆயிரக்கணக்கான தொழிலாளர்கள் வேலையிழந்தனர். முதலீடு வீணானது. தொழிற்சாலை கட்டி முடிக்கப்படவில்லை. அரசியல் கட்சிகள் கொண்டாடின. செய்தித்தாள்கள் எழுதின — நானோ கார் கனவு முடிந்தது. ரத்தன் டாடா தோற்றார் என்று உலகம் நினைத்தது."
      turning_point: "ஆனால் ரத்தன் டாடா சொன்னார் — நாங்கள் நகருகிறோம். 28 நாட்களுக்குள் குஜராத் சானந்துக்கு தொழிற்சாலை மாற்றப்பட்டது. இது உலக வரலாற்றில் மிகவும் வேகமான தொழிற்சாலை மாற்றம். குஜராத் முதலமைச்சர் நரேந்திர மோடி கைகொடுத்தார். 2009 ஆம் ஆண்டு நானோ கார் வெளியிடப்பட்டது."
      resolution: "நானோ கார் வெளியிடப்பட்டது. ₹1 லட்சம் கனவு நிஜமானது. உலகம் வியந்தது. டைம் இதழ் சிறந்த கண்டுபிடிப்பு என்று பாராட்டியது. ஒரு ஸ்கூட்டர் வேலை செய்யும் குடும்பங்களுக்கு கனவு நனவானது. ரத்தன் டாடா சொன்னது நடந்தது."
      lesson: "பாடம் என்ன? மற்றவர்களுக்காக கட்டும் கனவுகளை உலகம் நிறுத்த முடியாது. ரத்தன் டாடா நமக்கு இதை சொல்கிறார். இந்த வீடியோ உங்களுக்கு பயனுள்ளதாக இருந்தால் லைக் செய்யுங்கள், சப்ஸ்கிரைப் செய்யுங்கள், பெல் அழுத்துங்கள். நன்றி!"

  - title_ta: "கர்னல் சாண்டர்ஸ் — 1009 முறை நிராகரிக்கப்பட்டவர்"
    protagonist: "கர்னல் சாண்டர்ஸ்"
    protagonist_age: "65"
    situation: "அமெரிக்கா, 1952 — வெறும் ஒரு recipe மட்டும் கையில்"
    core_problem: "65 வயதில் எல்லாம் இழந்தார். ஒரே ஒரு வழி மட்டும் இருந்தது."
    emotional_hook: "1009 முறை. அவ்வளவு முறை நிராகரிக்கப்பட்டார். ஆனால் 1010வது முறை..."
    turning_point: "யூட்டாவில் ஒருவர் ஆம் என்றார். KFC பிறந்தது."
    lesson: "வயது ஒரு தடையல்ல. விடாமுயற்சி மட்டுமே வெற்றி"
    hook_question: "65 வயதில் 1009 முறை தோற்றவர் எப்படி பில்லியனர் ஆனார்?"
    open_loop: "ஆனால் 1010வது முறை என்ன நடந்தது?"
    story_mode: biographical
    content_bucket: success_failure
    wikipedia_subject: "Colonel Sanders"
    beats:
      hook: "1009 முறை. அந்த வார்த்தை மட்டும் அவர் மனதில் திரும்பத் திரும்ப ஒலித்தது. 1009 கடைகள் சொன்னன — வேண்டாம். 65 வயது முதியவர். கையில் வெறும் ஒரு சமையல் குறிப்பு. ஆனால் அவர் விட்டுக்கொடுக்கவில்லை. ஏன்? ஏனென்றால் அவருக்கு வேறு வழி இல்லை."
      context: "அவர் பெயர் ஹார்லாண்ட் சாண்டர்ஸ். கென்டக்கி மாநிலத்தில் ஒரு சாலை ஓரத்தில் உணவகம் வைத்திருந்தார். அவரது கோழி வறுவல் மக்களுக்கு மிகவும் பிடித்திருந்தது. ஆனால் 65 வயதில் ஒரு புதிய நெடுஞ்சாலை அவர் கடை வழியை மாற்றியது. வாடிக்கையாளர்கள் குறைந்தனர். கடன் வந்தது. உணவகம் மூடப்பட்டது. வாழ்க்கை தொடங்கியது."
      conflict: "அரசாங்கம் அவருக்கு மாதம் 105 டாலர் ஓய்வூதியம் கொடுத்தது. அதுவே முழு வருமானம். அவர் முடிவெடுத்தார் — என் சமையல் குறிப்பை கடைகளுக்கு விற்பேன். ஒவ்வொரு கோழி வறுவலுக்கும் ஒரு சிறிய தொகை கேட்பேன். ஆனால் யாரும் வேண்டவில்லை. முதல் கடை — வேண்டாம். இரண்டாவது — வேண்டாம். பத்தாவது — வேண்டாம். நூறாவது — இல்லை."
      escalation: "அவர் கார் ஓட்டினார். தூங்கினார். எழுந்தார். மீண்டும் முயன்றார். குளிரில், வெயிலில். 500 கடைகள். 700 கடைகள். 900 கடைகள். யாரும் ஆம் சொல்லவில்லை. வயதான உடம்பு வலித்தது. ஆனால் அவர் நிறுத்தவில்லை. ஏனென்றால் அவர் சொன்னார் — என் சமையல் குறிப்பு நல்லது என்று எனக்கு தெரியும்."
      turning_point: "1009வது முறை. யூட்டா மாநிலத்தில் ஒரு கடை. அவர் உள்ளே நடந்தார். சமையல் குறிப்பை விளக்கினார். கடை உரிமையாளர் பீட் ஹார்மன் சொன்னார் — ஆம். அந்த ஒரு வார்த்தை எல்லாவற்றையும் மாற்றியது. அவர்கள் சேர்ந்து KFC தொடங்கினர். கென்டக்கி ஃப்ரைட் சிக்கன் உலகிற்கு வந்தது."
      resolution: "இன்று உலகில் 25,000க்கும் மேற்பட்ட KFC கடைகள் உள்ளன. 145 நாடுகளில். கர்னல் சாண்டர்ஸ் 65 வயதில் தொடங்கினார். 73 வயதில் கோடீஸ்வரர் ஆனார். 1009 நிராகரிப்புகள் அவரை முடிக்கவில்லை. ஒரு ஆம் அவரை மாற்றியது."
      lesson: "பாடம்: வயது ஒரு தடையல்ல. நிராகரிப்பு ஒரு தடையல்ல. விடாமுயற்சி மட்டுமே வெற்றி. கர்னல் சாண்டர்ஸ் நமக்கு இதை சொல்கிறார். இந்த வீடியோ பயனுள்ளதாக இருந்தால் லைக் செய்யுங்கள், சப்ஸ்கிரைப் செய்யுங்கள், பெல் அழுத்துங்கள். நன்றி!"

  - title_ta: "நோக்கியா ஏன் வீழ்ந்தது? ஒரு அமைதியின் கதை"
    protagonist: "நோக்கியா"
    protagonist_age: ""
    situation: "ஃபின்லாந்து, 2007 — உலகின் நம்பர் 1 போன் நிறுவனம்"
    core_problem: "அச்சம் ஒரு நிறுவனத்தை அழித்தது"
    emotional_hook: "2007-ல் 40% சந்தை பங்கு. 2013-ல் கிட்டத்தட்ட பூஜ்யம்."
    turning_point: "ஐஃபோன் வந்தது. நோக்கியா பொறியாளர்கள் ஆபத்தை அறிந்தனர். ஆனால் சொல்லவில்லை."
    lesson: "ஒரு நிறுவனத்தை வெல்வது போட்டியாளர் அல்ல — அமைதி"
    hook_question: "உலகின் நம்பர் 1 போன் நிறுவனம் எப்படி 6 ஆண்டுகளில் மறைந்தது?"
    open_loop: "ஆனால் நோக்கியா பொறியாளர்களுக்கு முன்பே தெரிந்திருந்தது — ஏன் சொல்லவில்லை?"
    story_mode: biographical
    content_bucket: business
    wikipedia_subject: "Nokia"
    beats:
      hook: "2007 ஆம் ஆண்டு. நோக்கியா நிறுவனம் உலகில் 40 சதவீதம் போன்களை விற்றது. உலகில் ஒவ்வொரு இரண்டு பேரில் ஒருவர் நோக்கியா பயன்படுத்தினார். அதே ஆண்டு ஸ்டீவ் ஜாப்ஸ் ஒரு போனை வெளியிட்டார். நோக்கியா தலைவர்கள் சிரித்தார்கள் — இது ஒரு பொம்மை என்றார்கள். ஆறு ஆண்டுகளில் நோக்கியா இல்லாமல் போனது."
      context: "நோக்கியா ஃபின்லாந்தில் பிறந்தது. 1865 ஆம் ஆண்டு. தொடக்கத்தில் ரப்பர் தயாரிப்பு நிறுவனம். பிறகு கேபிள் தொழில். 1990களில் கைப்பேசி தொழிலில் நுழைந்தது. 2000 ஆம் ஆண்டில் உலகின் மிகப்பெரிய கைப்பேசி நிறுவனமாக மாறியது. சிம்பியன் இயக்க முறைமை. Snake விளையாட்டு. உலகம் நோக்கியாவை நேசித்தது."
      conflict: "2007 ஆம் ஆண்டு ஐஃபோன் வந்தது. நோக்கியா பொறியாளர்கள் அறிந்தனர் — தங்கள் சிம்பியன் மென்பொருள் பழையதாகி விட்டது. ஆனால் அவர்கள் மேலாளர்களிடம் சொல்லவில்லை. ஏன்? ஏனென்றால் மேலாளர்களுக்கு கெட்ட செய்தி சொல்வது வேலையை இழக்கும் என்று பயந்தார்கள். அந்த அமைதி நிறுவனத்தை அழித்தது."
      escalation: "ஆண்டுகள் கடந்தன. ஆண்டிராய்டு வந்தது. ஐஃபோன் வளர்ந்தது. நோக்கியா சந்தை பங்கு குறைந்தது. 40 சதவீதத்திலிருந்து 30 சதவீதம். 20 சதவீதம். 10 சதவீதம். நிறுவனம் உள்ளே தெரிந்தது — ஆபத்து வருகிறது. ஆனால் வெளியே சொல்லவில்லை. தலைவர்கள் மாறினார்கள். திட்டங்கள் மாறின. ஆனால் எதுவும் மாறவில்லை."
      turning_point: "2011 ஆம் ஆண்டு நோக்கியா மைக்ரோசாஃப்டுடன் இணைந்தது. விண்டோஸ் போன் வந்தது. ஆனால் மிகவும் தாமதமானது. சந்தை இழந்துவிட்டது. 2013 ஆம் ஆண்டு மைக்ரோசாஃப்ட் நோக்கியாவை வாங்கியது. ஃபின்லாந்தின் பெரும்பாலான ஊழியர்கள் வேலையிழந்தனர்."
      resolution: "இன்று நோக்கியா பேரு போன் தொழிலில் இல்லை. ஆனால் நெட்வொர்க் தொழிலில் உள்ளது. 5ஜி தொழில்நுட்பத்தில் முன்னிலையில் உள்ளது. ஒரு நிறுவனம் மாறியது. ஆனால் அந்த தவறை உலகம் மறக்கவில்லை."
      lesson: "பாடம்: ஒரு நிறுவனத்தை வெல்வது போட்டியாளர் அல்ல — உள்ளே இருக்கும் அமைதி. உண்மையை சொல்லும் கலாச்சாரம் இல்லாத நிறுவனம் வீழும். நோக்கியா நமக்கு இதை சொல்கிறது. இந்த வீடியோ பயனுள்ளதாக இருந்தால் லைக் செய்யுங்கள், சப்ஸ்கிரைப் செய்யுங்கள். நன்றி!"

  - title_ta: "நிகோலா டெஸ்லா — மின்சாரம் கொடுத்தவர் ஏன் மறக்கப்பட்டார்?"
    protagonist: "நிகோலா டெஸ்லா"
    protagonist_age: "36"
    situation: "நியூயார்க், 1893 — AC vs DC போர்"
    core_problem: "டெஸ்லா AC மின்சாரம் கொடுத்தார். எடிசன் பெயர் நிரந்தரமானது."
    emotional_hook: "உலகிற்கு மின்சாரம் கொடுத்தவர் ஒரு ஹோட்டல் அறையில் தனியாக இறந்தார்"
    turning_point: "1893 சிகாகோ உலக கண்காட்சி — AC மின்சாரம் வென்றது"
    lesson: "வரலாறு கண்டுபிடிப்பாளரை அல்ல, சந்தைப்படுத்துபவரை நினைவில் வைக்கும்"
    hook_question: "உலகிற்கு மின்சாரம் கொடுத்தவர் ஏன் பரிசேயமின்றி இறந்தார்?"
    open_loop: "ஆனால் எடிசனும் டெஸ்லாவும் நேரடியாக சந்தித்த அந்த நாள் என்ன நடந்தது?"
    story_mode: biographical
    content_bucket: success_failure
    wikipedia_subject: "Nikola Tesla"
    curiosity_score: 9.5
    beats:
      hook: "உலகிற்கு மின்சாரம் கொடுத்தவர். ஆனால் ஒரு ஹோட்டல் அறையில் தனியாக இறந்தார். பணம் இல்லை. நண்பர்கள் இல்லை. அவர் பெயர் நிகோலா டெஸ்லா. இன்று நம் வீட்டில் உள்ள ஒவ்வொரு மின்சாரப் பொருளும் அவர் கண்டுபிடிப்பால் இயங்குகிறது. ஆனால் வரலாறு அவரை மறந்தது. ஏன்?"
      context: "1856 ஆம் ஆண்டு. செர்பியாவில் ஒரு ஏழைக் குடும்பம். டெஸ்லா சிறுவயதிலேயே மின்சாரத்தில் ஆர்வமாக இருந்தார். பிறகு அமெரிக்கா வந்தார். தாமஸ் எடிசன் நிறுவனத்தில் வேலை செய்தார். இரண்டு மேதாவிகள் ஒரே இடத்தில். ஆனால் அவர்கள் கொள்கைகள் வேறுவேறு."
      conflict: "எடிசன் DC மின்சாரத்தை நம்பினார். டெஸ்லா AC மின்சாரம் சிறந்தது என்றார். எடிசன் ஒப்புக்கொள்ளவில்லை. டெஸ்லா வேலையை விட்டு வெளியேறினார். தனியாக ஆய்வு செய்தார். ஆனால் பணமில்லை. எடிசன் மக்களுக்கு AC மின்சாரம் ஆபத்தானது என்று பயமுறுத்தினார்."
      escalation: "எடிசன் யானைகளுக்கு AC மின்சாரம் கொடுத்து கொன்று காட்டினார். 'AC மின்சாரம் ஆபத்து' என்று பிரசாரம் செய்தார். செய்தித்தாள்கள் எடிசனை ஆதரித்தன. டெஸ்லா ஒதுக்கப்பட்டார். ஆனால் உண்மை அவர் பக்கம் இருந்தது."
      turning_point: "1893 ஆம் ஆண்டு சிகாகோ உலக கண்காட்சி. யார் மின்சாரம் கொடுப்பார்கள் என்று போட்டி. டெஸ்லா வென்றார். 200,000 விளக்குகள் AC மின்சாரத்தில் ஒளிர்ந்தன. உலகம் பார்த்தது — AC தான் வெற்றி."
      resolution: "இன்று நாம் பயன்படுத்தும் ஒவ்வொரு சாக்கெட்டும் AC மின்சாரம். டெஸ்லா கண்டுபிடித்தது. ஆனால் அவர் சொத்து இல்லாமல் இறந்தார். எடிசன் பெயர் பாடப்புத்தகங்களில் தங்கியது. நீதி இல்லாத உலகம்."
      lesson: "பாடம்: கண்டுபிடிப்பது மட்டும் போதாது — சந்தைப்படுத்தவும் தெரியவேண்டும். டெஸ்லா நமக்கு இதை சொல்கிறார். இந்த வீடியோ பயனுள்ளதாக இருந்தால் லைக் செய்யுங்கள், சப்ஸ்கிரைப் செய்யுங்கள். நன்றி!"

  - title_ta: "38 நிமிடங்கள் — வரலாற்றின் மிகக் குறுகிய போர்"
    protagonist: "ஆங்கிலோ-சாஞ்சிபார் போர்"
    protagonist_age: ""
    situation: "சாஞ்சிபார், 1896 ஆகஸ்ட் 27 — காலை 9:02"
    core_problem: "ஒரு சுல்தான் நியமனத்தை பிரிட்டன் ஒப்புக்கொள்ளவில்லை"
    emotional_hook: "போர் 9:02-க்கு தொடங்கியது. 9:40-க்கு முடிந்தது. 38 நிமிடங்கள்."
    turning_point: "சுல்தான் தப்பி ஓடினார். போர் முடிந்தது."
    lesson: "அதிகாரம் இல்லாத தலைமை — வெறும் பட்டம் மட்டுமே"
    hook_question: "வரலாற்றில் மிகக் குறுகிய போர் எவ்வளவு நேரம் நடந்தது?"
    open_loop: "ஆனால் 38 நிமிடங்களில் என்ன நடந்தது?"
    story_mode: biographical
    content_bucket: historical_story
    wikipedia_subject: "Anglo-Zanzibar War"
    curiosity_score: 9.5
    beats:
      hook: "1896 ஆம் ஆண்டு. ஆகஸ்ட் 27. காலை 9 மணி 2 நிமிடம். ஒரு போர் தொடங்கியது. 9 மணி 40 நிமிடம் — போர் முடிந்தது. வெறும் 38 நிமிடங்கள். இது வரலாற்றின் மிகக் குறுகிய போர். என்ன நடந்தது?"
      context: "சாஞ்சிபார் — ஆப்பிரிக்காவின் கிழக்கு கடற்கரையில் ஒரு சிறிய தீவு. அப்போது பிரிட்டன் ஆட்சி. அங்கு ஒரு புதிய சுல்தான் பதவிக்கு வந்தார் — காலிட் பின் பர்கஷ். பிரிட்டன் ஒப்புக்கொள்ளவில்லை. 'விலகு' என்று ultimatum கொடுத்தது."
      conflict: "சுல்தான் மறுத்தார். 'இது என் நாடு' என்றார். ஆனால் பிரிட்டன் கடலில் போர்க்கப்பல்களை நிறுத்தியது. சுல்தானிடம் சிறிய படை மட்டுமே இருந்தது. ஒரு பழைய கப்பல். சில நூறு வீரர்கள். ஆனால் அவர் விட மறுத்தார்."
      escalation: "காலை 9 மணிக்கு ultimatum முடிந்தது. சுல்தான் இன்னும் அரண்மனையில் இருந்தார். 2 நிமிடம் கடந்தது. பிரிட்டிஷ் கப்பல்கள் தயாரானன. வீரர்கள் காத்திருந்தனர். உலகம் இதை அறியவில்லை. ஆனால் வரலாறு ஒரு பதிவை தயார் செய்துகொண்டிருந்தது."
      turning_point: "9:02 — பிரிட்டன் சுட்டது. 38 நிமிடங்கள். அரண்மனை தகர்க்கப்பட்டது. சுல்தானின் கப்பல் மூழ்கியது. 500 பேர் மடிந்தனர். சுல்தான் ஓடினார். 9:40 — யுத்தம் முடிந்தது."
      resolution: "இது வரலாற்றில் பதிவானது — ஆங்கிலோ-சாஞ்சிபார் போர். 38 நிமிடங்கள். மிகக் குறுகிய போர். சுல்தான் வேறொரு நாட்டில் அடைக்கலம் கண்டார். சாஞ்சிபார் இன்று தான்சானியாவின் ஒரு பகுதி."
      lesson: "பாடம்: ஆதரவு இல்லாத தைரியம் வீண். அதிகாரம் மட்டும் போதாது — வலிமையும் வேண்டும். இந்த வீடியோ பயனுள்ளதாக இருந்தால் லைக் செய்யுங்கள், சப்ஸ்கிரைப் செய்யுங்கள். நன்றி!"
