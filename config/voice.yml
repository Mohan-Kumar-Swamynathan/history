provider: edge_tts

# PallaviNeural — best Tamil clarity + natural prosody
# ValluvarNeural is available but PallaviNeural handles mixed text better
default_voice: ta-IN-PallaviNeural
female_voice: ta-IN-PallaviNeural

# Rate: -8% = natural storytelling pace (was -15% which sounded robotic/dragged)
# Pitch: +2Hz lifts the flat synthesised quality — sounds more alive
rate: "-8%"
pitch: "+2Hz"

# 600ms pause between beats — good breathing room
pause_between_beats_ms: 600
