# துளிர் content bible — topic configuration
# Only topics scoring 8+ on all 7 dimensions are accepted

score_gate: 8.0        # minimum overall score
dedup_days: 30

content_pillars:
  success_failure:   0.40
  historical_story:  0.25
  business:          0.15
  psychology:        0.10
  science:           0.10

# Tamil TTS pace: ~110 words/min (slower than English)
# 100-150 words/beat × 7 beats = 700-1050 words = 6-10 min video
script_targets:
  beat_count:           7
  min_words_per_beat:   100
  max_words_per_beat:   150
  target_words_per_beat:120
  min_words_total:      600      # 600 Tamil words ≈ 5.5 min
  target_words_total:   840      # 840 Tamil words ≈ 7.5 min (sweet spot)
  max_words_total:      1200     # 1200 Tamil words ≈ 11 min

blocklist_patterns:
  - "history of"
  - "timeline of"
  - "introduction to"
  - "top 10"
  - "வேலை செய்யுங்கள்"
  - "motivation tips"
  - "2026"
  - "war"
  - "election"
