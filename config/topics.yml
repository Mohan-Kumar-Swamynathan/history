# துளிர் content bible — topic configuration
# Only topics scoring 8+ on all 7 dimensions are accepted

score_gate: 8.0        # minimum overall score to accept a topic
dedup_days: 30         # days before same protagonist can repeat

content_pillars:
  success_failure:   0.40   # Extraordinary People
  historical_story:  0.25   # History Stories
  business:          0.15   # Business Stories
  psychology:        0.10   # Strange True Stories (weird, unexpected)
  science:           0.10   # Science & Discovery

scoring_dimensions:
  - curiosity_score      # Does it make people unable to stop watching?
  - emotion_score        # Fear, hope, triumph, regret, surprise
  - conflict_score       # Clear antagonist or obstacle
  - shock_score          # Unexpected twist or counterintuitive fact
  - story_score          # Clear setup → conflict → resolution arc
  - thumbnail_score      # Can be captured in 1 image + 2-4 words
  - tamil_score          # Tamil audience personal connection

good_topic_test: "Makes viewers say: Wow, I never knew that."
bad_topic_test:  "Feels like a school lesson."

blocklist_patterns:
  - "history of"
  - "timeline of"
  - "வரலாறு பற்றி"
  - "பற்றிய வரலாறு"
  - "introduction to"
  - "top 10"
  - "வேலை செய்யுங்கள்"
  - "motivation tips"

script_targets:
  beat_count:         7        # HOOK + SETUP + CONFLICT + WORST + TURN + RESOLUTION + LESSON
  min_words_per_beat: 200
  max_words_per_beat: 350
  target_words_total: 1750     # 7 beats × 250 words = ~10 min at Tamil TTS pace
  min_words_total:    1500     # 8 min minimum
  max_words_total:    2500     # 15 min maximum
