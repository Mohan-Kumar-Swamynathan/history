name: Keep Alive

on:
  schedule:
    - cron: "0 0 * * *"   # daily midnight UTC — keeps repo active
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Keep repo active
        run: |
          git config user.name "Thulir Bot"
          git config user.email "bot@thulir.local"
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > .keepalive
          git add .keepalive
          git diff --staged --quiet || git commit -m "chore: keep-alive [skip ci]"
          git push || true
