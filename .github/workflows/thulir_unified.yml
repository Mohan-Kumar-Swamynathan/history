name: Thulir Unified Pipeline

# ── Schedule ─────────────────────────────────────────────────────────
# Peak Tamil YouTube audience times (IST):
#   Morning : 07:00–09:00 (commute / morning routine)
#   Evening : 19:00–21:00 (post-work / dinner)
#
# Upload 30 min BEFORE peak so YouTube indexes and pushes notifications
# by the time viewers are active.
#
# Morning slot  → cron 01:30 UTC = 07:00 IST
# Evening slot  → cron 13:30 UTC = 19:00 IST

on:
  schedule:
    - cron: "30 1 * * *"    # 07:00 IST — morning peak upload
    - cron: "30 13 * * *"   # 19:00 IST — evening peak upload
  workflow_dispatch:
    inputs:
      daily_slot:
        description: "Daily slot"
        required: false
        default: "morning_long"
        type: choice
        options:
          - morning_long
          - evening_long
      upload:
        description: "Upload to YouTube"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: thulir-unified-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  GEMINI_KEY:            ${{ secrets.GEMINI_KEY }}
  GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
  CLIENT_SECRETS_BASE64: ${{ secrets.CLIENT_SECRETS_BASE64 }}
  YOUTUBE_TOKEN_BASE64:  ${{ secrets.YOUTUBE_TOKEN_BASE64 }}
  GITHUB_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
  GITHUB_MODELS_TOKEN:   ${{ secrets.GH_PAT_TOKEN || secrets.GITHUB_TOKEN }}
  PEXELS_API_KEY:        ${{ secrets.PEXELS_API_KEY }}
  PYTHONUNBUFFERED:      "1"
  LLM_MODE:              hybrid
  LLM_CI_STRATEGY:       github_first

jobs:
  # ── Morning upload (07:00 IST) ──────────────────────────────────────
  morning_bundle:
    if: >
      github.event.schedule == '30 1 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.daily_slot == 'morning_long')
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            libass-dev \
            libcairo2-dev \
            libpango1.0-dev \
            fonts-noto \
            fonts-noto-core \
            fonts-noto-extra
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore YouTube credentials
        run: |
          if [ -n "$YOUTUBE_TOKEN_BASE64" ]; then
            echo "$YOUTUBE_TOKEN_BASE64" | base64 -d > youtube_token.pickle
            echo "✅ youtube_token.pickle restored"
          fi
          if [ -n "$CLIENT_SECRETS_BASE64" ]; then
            echo "$CLIENT_SECRETS_BASE64" | base64 -d > client_secrets.json || true
          fi

      - name: Generate + upload (morning)
        run: |
          UPLOAD_FLAG=""
          if [ "${{ github.event.inputs.upload || 'true' }}" = "true" ]; then
            UPLOAD_FLAG="--upload"
          fi
          python -c 'import sys,traceback; [print("OK:",m) or None for m in ["testing"]]' || true
          python generate_video.py \
            --format long \
            --daily-slot morning_long \
            $UPLOAD_FLAG 2>&1 | tee /tmp/run.log || (cat /tmp/run.log; exit 1)

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: thulir-morning-${{ github.run_id }}
          path: output/runs/**/*
          retention-days: 7

      - name: Persist topic history
        if: always()
        run: |
          git config user.name  "Thulir Bot"
          git config user.email "bot@thulir.local"
          # Force-add upload state files (they may have changed during upload)
          git add -f data/topic_history.json 2>/dev/null || true
          git add -f upload_state.json 2>/dev/null || true
          git add -f output/state/ 2>/dev/null || true
          git add -f .keepalive 2>/dev/null || true
          git status --short
          git diff --staged --quiet || git commit -m "chore: update topic history + upload state [skip ci]"
          git push || true
          echo "✅ State persisted" 

  # ── Evening upload (19:00 IST) ─────────────────────────────────────
  evening_bundle:
    if: >
      github.event.schedule == '30 13 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.daily_slot == 'evening_long')
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            libass-dev \
            libcairo2-dev \
            libpango1.0-dev \
            fonts-noto \
            fonts-noto-core \
            fonts-noto-extra
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore YouTube credentials
        run: |
          if [ -n "$YOUTUBE_TOKEN_BASE64" ]; then
            echo "$YOUTUBE_TOKEN_BASE64" | base64 -d > youtube_token.pickle
            echo "✅ youtube_token.pickle restored"
          fi
          if [ -n "$CLIENT_SECRETS_BASE64" ]; then
            echo "$CLIENT_SECRETS_BASE64" | base64 -d > client_secrets.json || true
          fi

      - name: Generate + upload (evening)
        run: |
          UPLOAD_FLAG=""
          if [ "${{ github.event.inputs.upload || 'true' }}" = "true" ]; then
            UPLOAD_FLAG="--upload"
          fi
          python generate_video.py \
            --format long \
            --daily-slot evening_long \
            $UPLOAD_FLAG

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: thulir-evening-${{ github.run_id }}
          path: output/runs/**/*
          retention-days: 7

      - name: Persist topic history
        if: always()
        run: |
          git config user.name  "Thulir Bot"
          git config user.email "bot@thulir.local"
          # Force-add upload state files (they may have changed during upload)
          git add -f data/topic_history.json 2>/dev/null || true
          git add -f upload_state.json 2>/dev/null || true
          git add -f output/state/ 2>/dev/null || true
          git add -f .keepalive 2>/dev/null || true
          git status --short
          git diff --staged --quiet || git commit -m "chore: update topic history + upload state [skip ci]"
          git push || true
          echo "✅ State persisted" 
