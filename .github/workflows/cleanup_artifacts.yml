name: Cleanup Old Artifacts

# Deletes workflow artifacts older than 2 days to stay within GitHub storage limits.
# Video generation: thulir_unified.yml

on:
  schedule:
    - cron: "15 2 * * *"   # 02:15 UTC daily (~07:45 IST)
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: write

    steps:
      - name: Delete artifacts older than 2 days
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const retentionDays = 2;
            const cutoff = new Date(Date.now() - retentionDays * 24 * 60 * 60 * 1000);

            let page = 1;
            let deleted = 0;
            let kept = 0;

            console.log(`Cutoff: artifacts created before ${cutoff.toISOString()} will be deleted`);

            while (true) {
              const { data } = await github.rest.actions.listArtifactsForRepo({
                owner, repo, per_page: 100, page
              });

              if (data.artifacts.length === 0) break;

              for (const artifact of data.artifacts) {
                const created = new Date(artifact.created_at);
                if (created < cutoff) {
                  try {
                    await github.rest.actions.deleteArtifact({
                      owner, repo, artifact_id: artifact.id
                    });
                    console.log(
                      `Deleted: ${artifact.name} ` +
                      `(${(artifact.size_in_bytes / 1024 / 1024).toFixed(1)}MB, ${artifact.created_at})`
                    );
                    deleted++;
                  } catch (err) {
                    console.log(`Could not delete ${artifact.name}: ${err.message}`);
                  }
                } else {
                  kept++;
                }
              }

              if (data.artifacts.length < 100) break;
              page++;
            }

            console.log(`Done — deleted ${deleted}, kept ${kept} (retention: ${retentionDays} days)`);
