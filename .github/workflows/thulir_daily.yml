name: Thulir Daily

# DEPRECATED — use "Thulir Daily Content" (generate_video.yml) instead.
# Cron disabled so only the unified src/ pipeline runs on schedule.

on:
  # schedule:
  #   - cron: "30 3 * * *"
  #   - cron: "30 14 * * *"
  push:
    paths:
      - "thulir_trigger.txt"
  workflow_dispatch:

concurrency:
  group: thulir-v2
  cancel-in-progress: false

permissions:
  contents: write
  models: read

env:
  GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  GITHUB_MODELS_TOKEN: ${{ secrets.GH_PAT_TOKEN || secrets.GITHUB_TOKEN }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  YOUTUBE_TOKEN_BASE64: ${{ secrets.YOUTUBE_TOKEN_BASE64 }}
  CLIENT_SECRETS_BASE64: ${{ secrets.CLIENT_SECRETS_BASE64 }}
  PYTHONUNBUFFERED: "1"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-noto fonts-noto-extra libcairo2-dev pkg-config python3-dev
          pip install --quiet edge-tts pillow requests cairosvg svgwrite numpy google-api-python-client google-auth-oauthlib google-auth-httplib2
          python3 -c "import cairosvg,PIL,numpy,edge_tts; print('All libs OK')"

      - name: Restore credentials
        run: |
          echo "$YOUTUBE_TOKEN_BASE64" | base64 -d > youtube_token.pickle 2>/dev/null || true
          echo "$CLIENT_SECRETS_BASE64" | base64 -d > client_secrets.json 2>/dev/null || true
          ls -la youtube_token.pickle client_secrets.json 2>/dev/null || true

      - name: Run pipeline
        run: |
          python3 thulir_v2_bot.py --upload 2>&1 | tee /tmp/thulir.log
          echo "Pipeline finished"

      - name: Show results
        if: always()
        run: |
          find . -name "*.mp4" 2>/dev/null | head -5 || echo "No videos"
          grep -E "youtu.be|ERROR|Traceback|DONE|✅|❌" /tmp/thulir.log | tail -30 || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: thulir-${{ github.run_number }}
          path: |
            thulir_v2/video/*.mp4
            thulir_v2/shorts/*.mp4
            /tmp/thulir.log
          retention-days: 3
          if-no-files-found: warn

      - name: Commit state
        if: always()
        continue-on-error: true
        run: |
          git config user.name "Thulir Bot"
          git config user.email "bot@thulir"
          git add thulir_v2/state.json thulir_upload_log.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "thulir run ${{ github.run_number }}"
          git push || true
