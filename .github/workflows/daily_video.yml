name: Tamil History — Daily Video Pipeline

on:
  schedule:
    - cron: "15 14 * * *"

  workflow_dispatch:
    inputs:
      topic_index:
        description: "Topic index (leave blank for auto-rotation)"
        required: false
        default: ""
      voice:
        description: "Voice profile"
        required: false
        default: "male_warm"
        type: choice
        options:
          - male_warm
          - female_emotional
      skip_video:
        description: "Skip video render (script + audio only)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      skip_upload:
        description: "Skip YouTube upload"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  models: read

env:
  GEMINI_KEY:            ${{ secrets.GEMINI_KEY }}
  GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
  PEXELS_API_KEY:        ${{ secrets.PEXELS_API_KEY }}
  CLIENT_SECRETS_BASE64: ${{ secrets.CLIENT_SECRETS_BASE64 }}
  YOUTUBE_TOKEN_BASE64:  ${{ secrets.YOUTUBE_TOKEN_BASE64 }}
  GITHUB_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
  GITHUB_MODELS_TOKEN:   ${{ secrets.GH_PAT_TOKEN || secrets.GITHUB_TOKEN }}
  PYTHONUNBUFFERED:      "1"

jobs:
  generate-video:
    name: Generate & Upload Tamil History Video
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-noto-extra
          sudo apt-get install -y fonts-lohit-taml fonts-noto-core || true
          echo "FFmpeg version: $(ffmpeg -version 2>&1 | head -1)"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore BGM cache
        uses: actions/cache@v4
        with:
          path: bgm/
          key: bgm-v1-${{ hashFiles('bgm_generator.py') }}
          restore-keys: bgm-v1-

      - name: Restore script/audio cache
        uses: actions/cache@v4
        with:
          path: cache/
          key: script-cache-${{ github.run_number }}
          restore-keys: script-cache-

      - name: Show today's optimal schedule
        run: python3 scheduler.py

      - name: Generate & Upload Tamil History Video
        run: |
          VOICE="${{ github.event.inputs.voice || 'male_warm' }}"
          SKIP="${{ github.event.inputs.skip_video || 'false' }}"
          SKIP_UP="${{ github.event.inputs.skip_upload || 'false' }}"
          TOPIC="${{ github.event.inputs.topic_index }}"

          CMD="python3 bot.py --voice $VOICE"
          if [ -n "$TOPIC" ]; then
            CMD="$CMD --topic $TOPIC"
          fi
          if [ "$SKIP" = "true" ]; then
            CMD="$CMD --skip-video"
          fi
          if [ "$SKIP_UP" = "true" ]; then
            CMD="$CMD --skip-upload"
          fi

          echo "Running: $CMD"
          $CMD

      - name: Upload video output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: history-video-${{ github.run_number }}
          path: |
            videos/*.mp4
            thumbnails/*.jpg
            scripts/*.txt
            *_package.json
            upload_state.json
          retention-days: 7

      - name: Upload audio only
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: history-audio-${{ github.run_number }}
          path: audio/*_narration.mp3
          retention-days: 7

      - name: Commit scheduler and upload state
        if: success()
        run: |
          git config user.name  "வரலாறு Bot"
          git config user.email "bot@varalaru-vizippu.auto"
          git add scheduler_state.json optimal_schedule.json upload_state.json || true
          git diff --staged --quiet || git commit -m "Daily run #${{ github.run_number }} — $(date +'%Y-%m-%d %H:%M UTC')"
          git push || true

      - name: Pipeline summary
        if: always()
        run: |
          echo "## வரலாறு விழிப்பு — Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Run time | $(date +'%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| IST time | $(TZ=Asia/Kolkata date +'%H:%M IST') |" >> $GITHUB_STEP_SUMMARY
          echo "| Voice | ${{ github.event.inputs.voice || 'male_warm' }} |" >> $GITHUB_STEP_SUMMARY
          if [ -f upload_state.json ]; then
            URL=$(python3 -c "import json; s=json.load(open('upload_state.json')); u=s.get('uploads',[]); print(u[-1].get('youtube_url','—') if u else '—')" 2>/dev/null || echo "—")
            echo "| YouTube | $URL |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f scheduler_state.json ]; then
            TOPIC=$(python3 -c "import json; s=json.load(open('scheduler_state.json')); print(s.get('last_topic','—'))" 2>/dev/null || echo "—")
            SOURCE=$(python3 -c "import json; s=json.load(open('scheduler_state.json')); print(s.get('last_topic_source','—'))" 2>/dev/null || echo "—")
            echo "| Topic | $TOPIC |" >> $GITHUB_STEP_SUMMARY
            echo "| Topic source | $SOURCE |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Video published to YouTube automatically (unless --skip-upload)." >> $GITHUB_STEP_SUMMARY
