name: துளிர் Enterprise — Daily Video

# DEPRECATED — use generate_video.yml for Thulir channel. Manual trigger only.

on:
  # schedule:
  #   - cron: "30 13 * * 1"   # Monday  19:00 IST
  #   - cron: "30 13 * * 5"   # Friday  19:00 IST
  workflow_dispatch:
    inputs:
      topic_idx:
        description: |
          Topic index (0-9):
          0 - No சொல்ல தெரியாதவர்களுக்கு
          1 - First Salary Guide
          2 - தினமும் படிக்கும் பழக்கம்
          3 - Toxic நண்பர்கள்
          4 - Anxiety handle பண்றது
          5 - Time management
          6 - Comparison trap
          7 - SIP investment guide
          8 - Parents-கிட்ட Career பேசுவது
          9 - Self awareness
        required: false
        default: ""
      upload:
        description: "Upload to YouTube? (yes/no)"
        required: false
        default: "no"
        type: choice
        options: ["no", "yes"]

concurrency:
  group: thulir-enterprise
  cancel-in-progress: false

permissions:
  contents: write
  models: read

env:
  GEMINI_KEY:          ${{ secrets.GEMINI_KEY }}
  GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
  GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
  GITHUB_MODELS_TOKEN: ${{ secrets.GH_PAT_TOKEN || secrets.GITHUB_TOKEN }}
  YOUTUBE_TOKEN_BASE64:    ${{ secrets.THULIR_YOUTUBE_TOKEN_BASE64 }}
  CLIENT_SECRETS_BASE64:   ${{ secrets.THULIR_CLIENT_SECRETS_BASE64 }}
  PYTHONUNBUFFERED:    "1"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    name: "Generate whiteboard video"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            ffmpeg \
            fonts-noto fonts-noto-extra \
            libcairo2-dev libpango1.0-dev \
            pkg-config python3-dev
          echo "✅ System deps installed"

      - name: Install Python dependencies
        run: |
          pip install --quiet \
            edge-tts pillow requests \
            cairosvg svgwrite \
            google-api-python-client \
            google-auth-oauthlib \
            google-auth-httplib2
          echo "✅ Python deps installed"

      - name: Verify setup
        run: |
          ffmpeg -version | head -1
          python3 -c "import cairosvg, svgwrite, edge_tts, PIL; print('✅ All libs ready')"
          echo "Tamil fonts:"
          ls /usr/share/fonts/truetype/noto/NotoSansTamil-*.ttf | head -3

      - name: Restore YouTube credentials
        if: github.event.inputs.upload == 'yes'
        run: |
          [ -n "$YOUTUBE_TOKEN_BASE64" ] && echo "$YOUTUBE_TOKEN_BASE64" | base64 -d > youtube_token.pickle || true
          [ -n "$CLIENT_SECRETS_BASE64" ] && echo "$CLIENT_SECRETS_BASE64" | base64 -d > client_secrets.json || true

      - name: Generate video
        run: |
          IDX="${{ github.event.inputs.topic_idx }}"
          UPLOAD="${{ github.event.inputs.upload || 'no' }}"

          if [ -n "$IDX" ]; then
            CMD="python3 thulir_enterprise_bot.py --topic-idx $IDX"
          else
            CMD="python3 thulir_enterprise_bot.py"
          fi

          [ "$UPLOAD" = "yes" ] && CMD="$CMD --upload" || CMD="$CMD --skip-upload"

          echo "▶ $CMD"
          $CMD 2>&1 | tee /tmp/thulir.log
          echo "EXIT=$?" >> $GITHUB_ENV

      - name: Results summary
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🌱 THULIR ENTERPRISE — RESULTS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          ls -lh thulir_enterprise/videos/*.mp4  2>/dev/null || echo "No video"
          ls -lh thulir_enterprise/thumbnails/*.jpg 2>/dev/null || echo "No thumbnail"
          echo ""
          echo "Last 30 log lines:"
          tail -30 /tmp/thulir.log 2>/dev/null || true

      - name: Write job summary
        if: always()
        run: |
          echo "## 🌱 Thulir Enterprise — Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Time | $(TZ=Asia/Kolkata date +'%H:%M IST %d %b %Y') |" >> $GITHUB_STEP_SUMMARY
          echo "| Topic idx | ${{ github.event.inputs.topic_idx || 'auto' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Upload | ${{ github.event.inputs.upload || 'no' }} |" >> $GITHUB_STEP_SUMMARY
          if ls thulir_enterprise/videos/*.mp4 2>/dev/null | head -1 | grep -q mp4; then
            VID=$(ls thulir_enterprise/videos/*.mp4 | head -1)
            SZ=$(du -sh "$VID" | cut -f1)
            DUR=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$VID" 2>/dev/null | xargs printf "%.0f")
            echo "| Video | $(basename $VID) ($SZ, ${DUR}s) |" >> $GITHUB_STEP_SUMMARY
            echo "| Status | ✅ Generated — download artifact below |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Status | ❌ Failed — check logs |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 📥 Download the artifact below → extract → watch the MP4 before uploading to YouTube." >> $GITHUB_STEP_SUMMARY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: thulir-enterprise-${{ github.run_number }}
          path: |
            thulir_enterprise/videos/*.mp4
            thulir_enterprise/thumbnails/*.jpg
            thulir_enterprise/scripts/*.txt
            thulir_enterprise/*.json
          retention-days: 3
          if-no-files-found: warn

      - name: Commit state
        if: success()
        run: |
          git config user.name  "துளிர் Enterprise Bot"
          git config user.email "bot@thulir.enterprise"
          git add thulir_enterprise/state.json thulir_enterprise/cache/ thulir_enterprise/scripts/ 2>/dev/null || true
          git diff --staged --quiet || \
            git commit -m "run: thulir enterprise #${{ github.run_number }} idx=${{ github.event.inputs.topic_idx || 'auto' }}"
          git push || true
